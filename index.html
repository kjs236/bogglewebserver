<!DOCTYPE html>
<html>
<head>
    <title>Boggle Controller</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: #222; 
            color: white; 
            padding-top: 20px;
            min-height: 100vh; 
            margin: 0; 
            box-sizing: border-box;
        }
        
        input { font-size: 1.5rem; margin: 10px; padding: 10px; width: 80%; border-radius: 8px; border: none; text-align: center; text-transform: uppercase;}
        button { font-size: 1.5rem; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; width: 85%;}
        button:disabled {
            background-color: #555 !important; 
            color: #888 !important; 
            cursor: not-allowed !important;
            animation: none !important; 
            box-shadow: none !important;
            transform: none !important;
        }

        input:disabled {
            background-color: #333 !important;
            color: #777 !important;
            cursor: not-allowed;
        }
        button:active { background-color: #0056b3; }
        #game-screen { display: none; } /* Hidden until they join */
        
        /* --- MOBILE LANDSCAPE RULES --- */
        @media screen and (orientation: landscape) and (max-height: 600px) {
            #welcome-msg { display: none; }
            
            #game-screen {
                display: flex;
                flex-direction: row;
                flex-wrap: wrap; 
                justify-content: center;
                align-items: center;
                padding-top: 10px;
            }

            #wordInput { width: 55%; margin: 5px; }
            #submitBtn { width: 30%; margin: 5px; }
            #feedbackBox, #status { width: 100%; margin-top: 5px;}
        } 
        /* --- END MOBILE LANDSCAPE RULES --- */

        /* Shake animation for wrong words */
        .error-shake {
            animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
            background-color: #ffe6e6 !important; 
            border: 2px solid #ff0000 !important; 
            color: #900 !important; 
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
        
        /* THE ON FIRE PULSE ANIMATION */
        body.on-fire-pulse {
            animation: fireGlow 2s ease-out 1;
        }

        @keyframes fireGlow {
            0% { box-shadow: inset 0 0 0px transparent; }
            10% { box-shadow: inset 0 0 40px #28a745, inset 0 0 80px #28a745; }
            30% { box-shadow: inset 0 0 15px #28a745; }
            50% { box-shadow: inset 0 0 40px #28a745, inset 0 0 80px #28a745; }
            70% { box-shadow: inset 0 0 15px #28a745; }
            100% { box-shadow: inset 0 0 0px transparent; }
        }
    </style>
</head>
<body>
    
    <div id="disconnectOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); color: white; z-index: 9999; flex-direction: column; justify-content: center; align-items: center; text-align: center; font-family: sans-serif;">
        <h2 style="margin-bottom: 10px;">Connection Lost</h2>
        <p>Waiting for Main Board to reconnect...</p>
    </div>
    
    <div id="login-screen">
        <h2>Join Game</h2>
        <input type="text" id="roomCode" placeholder="ROOM CODE" maxlength="4">
        <input type="text" id="playerName" placeholder="YOUR NAME">
        <button onclick="joinGame()">JOIN</button>
    </div>

    <div id="game-screen">
        <div style="margin-bottom: 20px; background-color: #333; padding: 10px; border-radius: 8px; width: 85%; margin-left: auto; margin-right: auto;">
            <h3 id="welcome-msg" style="margin: 0; color: #fff;"></h3>
            <h4 id="room-display" style="margin: 5px 0 10px 0; color: #ffaa00; letter-spacing: 2px;"></h4>
            <button onclick="leaveRoom()" style="font-size: 1rem; padding: 8px 16px; background-color: #dc3545; width: auto;">Wrong Room? Leave</button>
        </div>
        <input type="text" id="wordInput" placeholder="TYPE WORD HERE..." disabled>
        <div id="feedbackBox" style="display: none; padding: 10px; margin-top: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 1.2rem; transition: 0.2s;"></div>
        <button id="submitBtn" disabled onmousedown="event.preventDefault(); submitWord();" ontouchstart="event.preventDefault(); submitWord();">SUBMIT</button>
        <p id="status" style="color: #ffaa00; font-weight: bold;"></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); // Connect to the server
        let currentRoom = "";
        let currentPlayer = "";
        let validWordTimes = [];

        function joinGame() {
            currentRoom = document.getElementById('roomCode').value.toUpperCase();
            currentPlayer = document.getElementById('playerName').value.toUpperCase();

            if(currentRoom && currentPlayer) {
                socket.emit('joinRoom', { room: currentRoom, player: currentPlayer });
                
                // Swap the UI screens
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'block';
                
                // Update the display text ---
                document.getElementById('welcome-msg').innerText = "Player: " + currentPlayer;
                document.getElementById('room-display').innerText = "ROOM: " + currentRoom;
            }
        }

        function leaveRoom() {
            // Reloading the page safely severs the socket, clears their name from the server, 
            // and resets the UI back to the login screen instantly.
            window.location.reload();
        }

        function submitWord() {
            if (currentGameState !== 'Playing') return;
            
            let rawWord = document.getElementById('wordInput').value.toUpperCase();
            
            const word = rawWord.trim().replace(/\s+/g, '')
            if(word) {
                
                socket.emit('submitWord', { 
                    room: currentRoom, 
                    player: currentPlayer, 
                    word: word 
                });
                
                document.getElementById('status').innerText = "Sent: " + word;
                document.getElementById('wordInput').value = ""; // Clear box for next word
                document.getElementById('wordInput').focus();
            }
        }

        socket.on('nameError', (data) => {
            // Throw a pop-up alert to the phone
            alert(data.message);
            
            // Swap the UI screens BACK to the login screen
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            
            // Clear the name box so they can type a new one
            document.getElementById('playerName').value = "";
            
            // Reset the local variables
            currentRoom = "";
            currentPlayer = "";
        });

        let currentGameState = null;

        socket.on('server_state', (data) => {
            currentGameState = data.gameState;
            let inputBox = document.getElementById('wordInput');
            let submitButton = document.getElementById('submitBtn');
            
            const isPlaying = data.gameState === "Playing";

            // Set the disabled property to the OPPOSITE of isPlaying.
            // If playing = true, disabled = false. If playing = false, disabled = true.
            inputBox.disabled = !isPlaying;
            if (submitButton) {
                submitButton.disabled = !isPlaying;
            }

            
            if (!isPlaying) {
                inputBox.placeholder = "Round Ended!";
            } else if (inputBox.placeholder === "Round Ended!") {
                
                inputBox.placeholder = "Enter word..."; 
            }
        });

        socket.on('unrealResponse', (data) => {
            document.getElementById('status').innerText = data.message;
        });

        // Catch the feedback broadcast from the server
        socket.on('displayFeedback', (data) => {
            // Check if the message is actually meant for this specific phone
            if (data.player === currentPlayer) { 
                const feedbackBox = document.getElementById('feedbackBox');
                feedbackBox.innerText = data.message;
                feedbackBox.style.display = 'block';

                // Check the message to flash the right colors
                if (data.message === 'Valid') {
                    feedbackBox.style.backgroundColor = '#d4edda'; // Light green background
                    feedbackBox.style.color = '#155724';           // Dark green text
                    
                    // "ON FIRE" SLIDING WINDOW LOGIC
                    const currentTime = Date.now();
                    validWordTimes.push(currentTime); 
            
                    // Throw away any timestamps older than 8000ms (8 seconds)
                    validWordTimes = validWordTimes.filter(time => currentTime - time <= 8000);
            
                    // If there are 3 or more valid words within that 8-second window...
                    if (validWordTimes.length >= 3) {
                        triggerOnFirePulse(); 
                        validWordTimes = [];  
                    } 
                } else {
                    // It's a wrong or duplicate word!
                    feedbackBox.style.backgroundColor = '#f8d7da'; // Light red background
                    feedbackBox.style.color = '#721c24';           // Dark red text
                    
                    // --- NEW HAPTICS & SHAKE LOGIC ---
                    
                    // Hardware Vibrate (Works on Android)
                    if (navigator.vibrate) {
                        navigator.vibrate(100); 
                    }
                    
                    // Shake the input box
                    const inputField = document.getElementById('wordInput');
                    inputField.classList.remove('error-shake');
                    void inputField.offsetWidth; // Force reflow so it restarts if they spam it
                    inputField.classList.add('error-shake');
                    
                    // Remove the red shake class after 100ms so it goes back to normal
                    setTimeout(() => {
                        inputField.classList.remove('error-shake');
                    }, 100);
                }

                // Make the warning disappear after 1.0 seconds
                setTimeout(() => {
                    feedbackBox.style.display = 'none';
                }, 1000);
            }
        });

        socket.on('lockPhones', () => {
            const wordInput = document.getElementById('wordInput');
            const submitBtn = document.getElementById('submitBtn');
            
            wordInput.disabled = true;
            wordInput.value = "";
            wordInput.placeholder = "TIME'S UP!";
            submitBtn.disabled = true; // CSS :disabled handles the grey color
            
            document.getElementById('status').innerText = "Pencils down! Look at the main screen.";
            document.getElementById('status').style.color = "#ff4444";
        });

        socket.on('unlockPhones', () => {
            const wordInput = document.getElementById('wordInput');
            const submitBtn = document.getElementById('submitBtn');
            
            wordInput.disabled = false;
            wordInput.value = "";
            wordInput.placeholder = "TYPE WORD HERE...";
            submitBtn.disabled = false; // CSS handles restoring the blue color
            
            document.getElementById('status').innerText = "Ready for the next round!";
            document.getElementById('status').style.color = "#ffaa00";
        });

        // Trigger the 'Submit' button when Enter is pressed on the word input
        document.getElementById("wordInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // Prevents the mobile keyboard from doing anything weird
                submitWord();
            }
        });

        // Trigger the 'Join' button when Enter is pressed on the player name input
        document.getElementById("playerName").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                joinGame();
            }
        });

        
        socket.on('host_disconnected', () => {
            console.log("Host disconnected! Blacking out phone UI...");
            
            // Change display
            document.getElementById('disconnectOverlay').style.display = 'flex'; 
            
            // Lock the inputs
            document.getElementById('wordInput').disabled = true;
            document.getElementById('submitBtn').disabled = true;
        });

        socket.on('host_reconnected', () => {
            console.log("Host reconnected! Restoring phone UI...");
            
            document.getElementById('disconnectOverlay').style.display = 'none'; 
            
            const isPlaying = currentGameState === 'Playing';
            document.getElementById('wordInput').disabled = !isPlaying;
            document.getElementById('submitBtn').disabled = !isPlaying;
        });

        document.getElementById('wordInput').addEventListener('focus', () => {
            setTimeout(() => {
                document.getElementById('wordInput').scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300); 
        });

        function triggerOnFirePulse() {
            console.log("PLAYER IS ON FIRE! 3 words in 8 seconds!");
            
            // Add the glowing class to the body
            document.body.classList.add('on-fire-pulse');
            
            
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100, 50, 200]); 
            }
            
            // Remove the glow after 2 seconds
            setTimeout(() => {
                document.body.classList.remove('on-fire-pulse');
            }, 2000);
        }
    </script>
</body>
</html>
